<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Element Savaşları - Ultra Detaylı Şehir</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- MENÜ EKRANI --- */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            z-index: 1000;
        }

        .menu-title {
            font-size: 3rem;
            color: #fff;
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
            margin-top: 20px;
            text-align: center;
        }

        .character-select-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 90%;
            padding: 20px 10px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            border: 4px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .char-card {
            min-width: 110px;
            height: 140px;
            background: #fff;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #ccc;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
        }

        .char-card.selected {
            border-color: #ffcc00;
            transform: scale(1.08);
            box-shadow: 0 8px 0px #d4a000;
        }

        .char-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .char-name {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .btn-play {
            width: 220px;
            height: 70px;
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: 4px solid #fff;
            border-radius: 35px;
            font-size: 2rem;
            color: #fff;
            font-weight: 900;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 8px 0px #cc7a00, 0 15px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            margin-bottom: 30px;
        }

        .btn-play:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #cc7a00;
        }

        /* --- OYUN İÇİ ARAYÜZ VE MOBİL TUŞLAR --- */
        #game-ui {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #controls-info {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.65);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        /* Mobil & PC Ekranda Her Zaman Görünür Tuşlar */
        .touch-btn {
            position: absolute;
            background: rgba(255, 60, 60, 0.85);
            border: 3px solid #fff;
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 1px 1px 2px #000;
            touch-action: manipulation;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        .touch-btn:active {
            transform: scale(0.95);
        }

        #btn-shoot-mobile {
            bottom: 40px;
            right: 40px;
            width: 85px;
            height: 85px;
            font-size: 18px;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        #btn-jump-mobile {
            bottom: 145px;
            right: 45px;
            width: 70px;
            height: 70px;
            font-size: 14px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        /* Yön Pad (D-Pad) */
        #dpad-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            pointer-events: auto;
        }

        .dpad-btn {
            position: absolute;
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            backdrop-filter: blur(4px);
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .dpad-btn:active {
            background: rgba(255, 204, 0, 0.8);
        }

        #dpad-up { top: 0; left: 48px; }
        #dpad-down { bottom: 0; left: 48px; }
        #dpad-left { top: 48px; left: 0; }
        #dpad-right { top: 48px; right: 0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-overlay">
        <div class="menu-title">ELEMENT SAVAŞLARI</div>
        
        <div class="character-select-container" id="char-container"></div>

        <button class="btn-play" onclick="startGame()">OYNA</button>
    </div>

    <div id="game-ui">
        <div class="crosshair"></div>

        <div id="controls-info">
            <b>Kontroller:</b><br>
            • <b>W, A, S, D / Ekran Yön Tuşları:</b> Yürü<br>
            • <b>Sağ Tık / Ekran Sürükle:</b> Bakış Yönü<br>
            • <b>E / ATEŞ Butonu:</b> Element At<br>
            • <b>Space (Boşluk) / ZIPLA Butonu:</b> Zıpla
        </div>

        <div class="touch-btn" id="btn-jump-mobile">ZIPLA</div>
        <div class="touch-btn" id="btn-shoot-mobile">ATEŞ</div>

        <div id="dpad-container">
            <div class="dpad-btn" id="dpad-up">▲</div>
            <div class="dpad-btn" id="dpad-down">▼</div>
            <div class="dpad-btn" id="dpad-left">◄</div>
            <div class="dpad-btn" id="dpad-right">►</div>
        </div>
    </div>

    <script>
        // --- KARAKTER VE ELEMENT LİSTESİ ---
        const CHARACTERS = [
            { name: "Ateş", color: 0xff3300, icon: "#ff3300" },
            { name: "Su", color: 0x0099ff, icon: "#0099ff" },
            { name: "Hava", color: 0x99ffff, icon: "#99ffff" },
            { name: "Toprak", color: 0x8b5a2b, icon: "#8b5a2b" },
            { name: "Şimşek", color: 0xffff00, icon: "#ffff00" },
            { name: "Buz", color: 0x00ffff, icon: "#00ffff" },
            { name: "Gölge", color: 0x4b0082, icon: "#4b0082" },
            { name: "Işık", color: 0xfff8dc, icon: "#fff8dc" },
            { name: "Doğa", color: 0x228b22, icon: "#228b22" },
            { name: "Lav", color: 0xff4500, icon: "#ff4500" }
        ];

        let selectedChar = CHARACTERS[0];

        // Menü Oluşturma
        const charContainer = document.getElementById('char-container');
        CHARACTERS.forEach((char, index) => {
            const card = document.createElement('div');
            card.className = `char-card ${index === 0 ? 'selected' : ''}`;
            card.onclick = () => {
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedChar = char;
            };

            const icon = document.createElement('div');
            icon.className = 'char-icon';
            icon.style.background = char.icon;

            const name = document.createElement('div');
            name.className = 'char-name';
            name.innerText = char.name;

            card.appendChild(icon);
            card.appendChild(name);
            charContainer.appendChild(card);
        });

        // --- TEMEL DEĞİŞKENLER VE FİZİK ---
        let scene, camera, renderer;
        let keys = { w: false, a: false, s: false, d: false };
        let projectiles = [];
        let isRightMouseDown = false;
        let previousMousePosition = { x: 0, y: 0 };
        let yaw = 0, pitch = 0;

        // Zıplama & Fizik Değişkenleri
        let playerVelocityY = 0;
        let isGrounded = true;
        const gravity = -0.015;
        const jumpStrength = 0.35;
        const playerHeight = 2.5;

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.002);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 0);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            window.addEventListener('contextmenu', e => e.preventDefault());

            // Gelişmiş Işıklandırma
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
            sunLight.position.set(120, 180, 80);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 500;
            const d = 200;
            sunLight.shadow.camera.left = -d;
            sunLight.shadow.camera.right = d;
            sunLight.shadow.camera.top = d;
            sunLight.shadow.camera.bottom = -d;
            scene.add(sunLight);

            // Detaylı Şehir Yapısını Oluştur
            createDetailedCity();
        }

        // --- DETAYLI ŞEHİR (400+ OBJE) ---
        function createDetailedCity() {
            // Ana Zemin
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Yollar
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            for(let i = -200; i <= 200; i += 50) {
                const roadV = new THREE.Mesh(new THREE.PlaneGeometry(14, 600), roadMat);
                roadV.rotation.x = -Math.PI / 2;
                roadV.position.set(i, 0.01, 0);
                roadV.receiveShadow = true;
                scene.add(roadV);

                const roadH = new THREE.Mesh(new THREE.PlaneGeometry(600, 14), roadMat);
                roadH.rotation.x = -Math.PI / 2;
                roadH.position.set(0, 0.01, i);
                roadH.receiveShadow = true;
                scene.add(roadH);
            }

            // Materyal Havuzu
            const buildingMats = [
                new THREE.MeshStandardMaterial({ color: 0x3a405a, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0x5c5d67, roughness: 0.4 }),
                new THREE.MeshStandardMaterial({ color: 0x455a64, roughness: 0.2 }),
                new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.5 })
            ];
            const windowMat = new THREE.MeshBasicMaterial({ color: 0xffeb3b });
            const propMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const foliageMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4e342e });

            // Binalar, Klima Santralleri ve Pencereler
            for (let x = -180; x <= 180; x += 50) {
                for (let z = -180; z <= 180; z += 50) {
                    if (Math.abs(x) < 25 && Math.abs(z) < 25) continue; // Doğma alanı

                    const h = 20 + Math.random() * 50;
                    const w = 14 + Math.random() * 8;
                    const d = 14 + Math.random() * 8;

                    const bMat = buildingMats[Math.floor(Math.random() * buildingMats.length)];
                    const building = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bMat);
                    building.position.set(x, h / 2, z);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);

                    // Çatı Kliması Detayı
                    const ac = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), propMat);
                    ac.position.set(x + 1, h + 1, z + 1);
                    ac.castShadow = true;
                    scene.add(ac);

                    // Ön Yüzey Pencereleri
                    for (let yWin = 4; yWin < h - 4; yWin += 5) {
                        const win = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.8), windowMat);
                        win.position.set(x, yWin, z + d / 2 + 0.02);
                        scene.add(win);
                    }
                }
            }

            // Sokak Lambaları & Ağaçlar
            for (let i = -220; i <= 220; i += 20) {
                if (i % 50 === 0) continue;

                // Sokak Lambası
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 7), propMat);
                pole.position.set(i, 3.5, -9);
                pole.castShadow = true;
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({ color: 0xffffcc }));
                bulb.position.set(i, 7, -8.5);
                scene.add(pole, bulb);

                // Ağaç
                if (Math.random() > 0.4) {
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 3), trunkMat);
                    trunk.position.set(i, 1.5, 9);
                    const foliage = new THREE.Mesh(new THREE.DodecahedronGeometry(2.5), foliageMat);
                    foliage.position.set(i, 4, 9);
                    foliage.castShadow = true;
                    scene.add(trunk, foliage);
                }
            }
        }

        // --- ZIPLAMA VE KONTROL SİSTEMİ ---
        function jump() {
            if (isGrounded) {
                playerVelocityY = jumpStrength;
                isGrounded = false;
            }
        }

        function setupControls() {
            // Klavye Basmaları
            window.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = true;
                if (key === 's') keys.s = true;
                if (key === 'a') keys.a = true;
                if (key === 'd') keys.d = true;
                if (key === 'e') shootElement();
                if (e.code === 'Space') jump();
            });

            window.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = false;
                if (key === 's') keys.s = false;
                if (key === 'a') keys.a = false;
                if (key === 'd') keys.d = false;
            });

            // Fare ile Bakış (Sağ Tık)
            window.addEventListener('mousedown', (e) => {
                if (e.button === 2) {
                    isRightMouseDown = true;
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (e.button === 2) isRightMouseDown = false;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isRightMouseDown) return;

                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                yaw -= deltaX * 0.003;
                pitch -= deltaY * 0.003;
                pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));

                camera.rotation.y = yaw;
                camera.rotation.x = pitch;

                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            // Mobil/Ekran Buton Bağlantıları
            const bindDpad = (id, keyName) => {
                const el = document.getElementById(id);
                const startMove = (e) => { e.preventDefault(); keys[keyName] = true; };
                const endMove = (e) => { e.preventDefault(); keys[keyName] = false; };
                el.addEventListener('touchstart', startMove);
                el.addEventListener('touchend', endMove);
                el.addEventListener('mousedown', startMove);
                el.addEventListener('mouseup', endMove);
            };
            bindDpad('dpad-up', 'w');
            bindDpad('dpad-down', 's');
            bindDpad('dpad-left', 'a');
            bindDpad('dpad-right', 'd');

            const shootBtn = document.getElementById('btn-shoot-mobile');
            shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shootElement(); });
            shootBtn.addEventListener('click', shootElement);

            const jumpBtn = document.getElementById('btn-jump-mobile');
            jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
            jumpBtn.addEventListener('click', jump);

            // Dokunmatik Sürükleme (Ekranın Sağ Tarafı ile Bakış)
            let touchStartX = 0, touchStartY = 0;
            window.addEventListener('touchstart', (e) => {
                if (e.touches[0].clientX > window.innerWidth / 2) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            });

            window.addEventListener('touchmove', (e) => {
                if (e.touches[0].clientX > window.innerWidth / 2) {
                    const deltaX = e.touches[0].clientX - touchStartX;
                    const deltaY = e.touches[0].clientY - touchStartY;

                    yaw -= deltaX * 0.004;
                    pitch -= deltaY * 0.004;
                    pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));

                    camera.rotation.y = yaw;
                    camera.rotation.x = pitch;

                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            });
        }

        // --- ATEŞ / MÜHİMMAT EFEKTİ ---
        function shootElement() {
            const projGeo = new THREE.SphereGeometry(1.0, 16, 16);
            const projMat = new THREE.MeshBasicMaterial({ color: selectedChar.color });
            const proj = new THREE.Mesh(projGeo, projMat);

            // Mermiye Işık Efekti
            const light = new THREE.PointLight(selectedChar.color, 2, 10);
            proj.add(light);

            proj.position.copy(camera.position);

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            proj.userData = { velocity: dir.multiplyScalar(2.2) };

            scene.add(proj);
            projectiles.push(proj);
        }

        // --- OYUNU BAŞLAT ---
        function startGame() {
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';

            initScene();
            setupControls();
            animate();
        }

        // --- OYUN DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            // Yatay Hareket
            const moveSpeed = 0.35;
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();

            const side = new THREE.Vector3();
            side.crossVectors(camera.up, forward).negate();

            if (keys.w) camera.position.addScaledVector(forward, moveSpeed);
            if (keys.s) camera.position.addScaledVector(forward, -moveSpeed);
            if (keys.d) camera.position.addScaledVector(side, moveSpeed);
            if (keys.a) camera.position.addScaledVector(side, -moveSpeed);

            // Zıplama & Yıkım Fiziği
            camera.position.y += playerVelocityY;
            playerVelocityY += gravity;

            if (camera.position.y <= playerHeight) {
                camera.position.y = playerHeight;
                playerVelocityY = 0;
                isGrounded = true;
            }

            // Mermi İlerlemesi
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.position.add(p.userData.velocity);

                if (p.position.distanceTo(camera.position) > 250) {
                    scene.remove(p);
                    projectiles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
