<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Detaylı Şehir - GitHub Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87ceeb;
            font-family: Arial, sans-serif;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui">
        <h2>🏙️ Mega Şehir Simulator</h2>
        <p>Fare ile etrafta gezinebilir, döndürebilir ve yakınlaşabilirsin.</p>
    </div>

    <script>
        // 1. Sahne, Kamera ve Renderer Kurulumu
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Gökyüzü mavi
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.003); // Hafif şehir sisi

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(100, 80, 150);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.01; // Yerin altına girmeyi engelle

        // 2. Işıklandırma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff5ea, 1.2);
        sunLight.position.set(150, 200, 100);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 500;
        const d = 150;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        scene.add(sunLight);

        // 3. Zemin ve Yollar
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Materyal Deposu
        const matBuilding = [
            new THREE.MeshStandardMaterial({ color: 0x34495e }),
            new THREE.MeshStandardMaterial({ color: 0x7f8c8d }),
            new THREE.MeshStandardMaterial({ color: 0x2c3e50 }),
            new THREE.MeshStandardMaterial({ color: 0x95a5a6 })
        ];
        const matWindow = new THREE.MeshBasicMaterial({ color: 0xffeb3b });
        const matGrass = new THREE.MeshStandardMaterial({ color: 0x27ae60 });
        const matWood = new THREE.MeshStandardMaterial({ color: 0x5e35b1 });
        const matLeaves = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
        const matSidewalk = new THREE.MeshStandardMaterial({ color: 0xbdc3c7 });
        const matPropRed = new THREE.MeshStandardMaterial({ color: 0xe74c3c });
        const matPropYellow = new THREE.MeshStandardMaterial({ color: 0xf1c40f });

        // Şehir Blokları Oluşturma
        const gridSize = 5;
        const blockSize = 80;
        const roadWidth = 20;

        for (let x = -2; x <= 2; x++) {
            for (let z = -2; z <= 2; z++) {
                const posX = x * (blockSize + roadWidth);
                const posZ = z * (blockSize + roadWidth);

                // Park Alanı (Merkez Blok)
                if (x === 0 && z === 0) {
                    createPark(posX, posZ, blockSize);
                } else {
                    createCityBlock(posX, posZ, blockSize);
                }
            }
        }

        // 4. Detaylı Şehir Bloğu
        function createCityBlock(centerX, centerZ, size) {
            // Kaldırım
            const sidewalk = new THREE.Mesh(new THREE.BoxGeometry(size, 0.4, size), matSidewalk);
            sidewalk.position.set(centerX, 0.2, centerZ);
            sidewalk.receiveShadow = true;
            scene.add(sidewalk);

            // Binalar ve Çatı Detayları
            const subGrid = 2;
            const bSize = (size - 10) / subGrid;

            for (let bx = 0; bx < subGrid; bx++) {
                for (let bz = 0; bz < subGrid; bz++) {
                    const bX = centerX - size/2 + 5 + bSize/2 + bx * bSize;
                    const bZ = centerZ - size/2 + 5 + bSize/2 + bz * bSize;
                    
                    const bHeight = 15 + Math.random() * 50;
                    const bMat = matBuilding[Math.floor(Math.random() * matBuilding.length)];

                    const building = new THREE.Mesh(new THREE.BoxGeometry(bSize - 2, bHeight, bSize - 2), bMat);
                    building.position.set(bX, bHeight / 2 + 0.4, bZ);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);

                    // Çatı Detayları (Anten / Havalandırma)
                    if (Math.random() > 0.3) {
                        const vent = new THREE.Mesh(
                            new THREE.BoxGeometry(2, 2, 2),
                            new THREE.MeshStandardMaterial({ color: 0x7f8c8d })
                        );
                        vent.position.set(bX + (Math.random()-0.5)*4, bHeight + 1.4, bZ + (Math.random()-0.5)*4);
                        scene.add(vent);
                    }

                    // Pencereler
                    for (let h = 3; h < bHeight - 2; h += 4) {
                        if (Math.random() > 0.2) {
                            const win = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), matWindow);
                            win.position.set(bX, h + 0.4, bZ + (bSize - 2)/2 + 0.01);
                            scene.add(win);
                        }
                    }
                }
            }

            // Sokak Elemanları (Lambalar, Duraklar, Çöp Kutuları)
            createStreetProps(centerX, centerZ, size);
        }

        // 5. Park Alanı Oluşturma
        function createPark(centerX, centerZ, size) {
            const park = new THREE.Mesh(new THREE.BoxGeometry(size, 0.4, size), matGrass);
            park.position.set(centerX, 0.2, centerZ);
            park.receiveShadow = true;
            scene.add(park);

            // Ağaçlar
            for (let i = 0; i < 15; i++) {
                const tx = centerX + (Math.random() - 0.5) * (size - 10);
                const tz = centerZ + (Math.random() - 0.5) * (size - 10);

                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 3), matWood);
                trunk.position.set(tx, 1.7, tz);
                trunk.castShadow = true;
                scene.add(trunk);

                const leaves = new THREE.Mesh(new THREE.DodecahedronGeometry(2), matLeaves);
                leaves.position.set(tx, 4, tz);
                leaves.castShadow = true;
                scene.add(leaves);
            }
        }

        // 6. Sokak Detayları (Ağaç, Lamba, Yangın Musluğu, Trafik Işığı)
        function createStreetProps(centerX, centerZ, size) {
            const offset = size / 2 + 2;

            // Sokak Lambaları
            const lampPositions = [
                [centerX - offset, centerZ - offset],
                [centerX + offset, centerZ - offset],
                [centerX - offset, centerZ + offset],
                [centerX + offset, centerZ + offset]
            ];

            lampPositions.forEach(pos => {
                const pole = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.1, 0.1, 6),
                    new THREE.MeshStandardMaterial({ color: 0x333333 })
                );
                pole.position.set(pos[0], 3, pos[1]);
                scene.add(pole);

                const light = new THREE.Mesh(new THREE.SphereGeometry(0.4), matWindow);
                light.position.set(pos[0], 6, pos[1]);
                scene.add(light);
            });

            // Yangın Muslukları ve Çöp Kutuları
            for (let i = -1; i <= 1; i += 2) {
                const hydrant = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.2, 0.2, 0.8),
                    matPropRed
                );
                hydrant.position.set(centerX + i * (size/3), 0.8, centerZ + offset);
                scene.add(hydrant);

                const bin = new THREE.Mesh(
                    new THREE.BoxGeometry(0.6, 0.9, 0.6),
                    new THREE.MeshStandardMaterial({ color: 0x27ae60 })
                );
                bin.position.set(centerX + offset, 0.85, centerZ + i * (size/3));
                scene.add(bin);
            }
        }

        // 7. Ekran Boyutu Değişimi
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 8. Oyun / Animasyon Döngüsü
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
