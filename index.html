<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Element Savaşları - Brawl Edition</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Fredoka One', 'Segoe UI', Roboto, sans-serif;
        }

        /* --- BRAWL STARS TARZI NEŞELİ MENÜ --- */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        .menu-title {
            font-size: 3rem;
            color: #fff;
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
            margin-top: 20px;
            text-align: center;
        }

        .character-select-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 90%;
            padding: 20px 10px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            border: 4px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .char-card {
            min-width: 110px;
            height: 140px;
            background: #fff;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #ccc;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
        }

        .char-card.selected {
            border-color: #ffcc00;
            transform: scale(1.08);
            box-shadow: 0 8px 0px #d4a000;
        }

        .char-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .char-name {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .btn-play {
            width: 220px;
            height: 70px;
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: 4px solid #fff;
            border-radius: 35px;
            font-size: 2rem;
            color: #fff;
            font-weight: 900;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 8px 0px #cc7a00, 0 15px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            margin-bottom: 30px;
            transition: active 0.1s;
        }

        .btn-play:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #cc7a00;
        }

        /* --- OYUN İÇİ MOBİL KONTROLLER --- */
        #game-ui {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Touch / Dokunmatik Butonlar */
        .touch-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 1px 1px 2px #000;
            touch-action: manipulation;
        }

        #btn-shoot {
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: rgba(255, 50, 50, 0.6);
            border-color: #ff4d4d;
        }

        #btn-up {
            bottom: 130px;
            right: 40px;
            width: 60px;
            height: 60px;
        }

        #btn-down {
            bottom: 40px;
            right: 130px;
            width: 60px;
            height: 60px;
        }

        /* Sanal Joystick Alanı */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: auto;
        }

        #joystick-knob {
            position: absolute;
            top: 35px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-overlay">
        <div class="menu-title">ELEMENT SAVAŞLARI</div>
        
        <div class="character-select-container" id="char-container">
            </div>

        <button class="btn-play" onclick="startGame()">OYNA</button>
    </div>

    <div id="game-ui">
        <div class="crosshair"></div>
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
        <div class="touch-btn" id="btn-up">YÜKSEL</div>
        <div class="touch-btn" id="btn-down">ALÇAL</div>
        <div class="touch-btn" id="btn-shoot">ATEŞ</div>
    </div>

    <script>
        // --- 10 KARAKTER VE ELEMENT LİSTESİ ---
        const CHARACTERS = [
            { name: "Ateş", color: 0xff3300, icon: "#ff3300" },
            { name: "Su", color: 0x0099ff, icon: "#0099ff" },
            { name: "Hava", color: 0x99ffff, icon: "#99ffff" },
            { name: "Toprak", color: 0x8b5a2b, icon: "#8b5a2b" },
            // Ek 6 Mantıklı Karakter/Element
            { name: "Şimşek", color: 0xffff00, icon: "#ffff00" },
            { name: "Buz", color: 0x00ffff, icon: "#00ffff" },
            { name: "Gölge", color: 0x4b0082, icon: "#4b0082" },
            { name: "Işık", color: 0xfff8dc, icon: "#fff8dc" },
            { name: "Doğa", color: 0x228b22, icon: "#228b22" },
            { name: "Lav", color: 0xff4500, icon: "#ff4500" }
        ];

        let selectedChar = CHARACTERS[0];

        // Menü Karakterlerini Oluşturma
        const charContainer = document.getElementById('char-container');
        CHARACTERS.forEach((char, index) => {
            const card = document.createElement('div');
            card.className = `char-card ${index === 0 ? 'selected' : ''}`;
            card.onclick = () => {
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedChar = char;
            };

            const icon = document.createElement('div');
            icon.className = 'char-icon';
            icon.style.background = char.icon;

            const name = document.createElement('div');
            name.className = 'char-name';
            name.innerText = char.name;

            card.appendChild(icon);
            card.appendChild(name);
            charContainer.appendChild(card);
        });

        // --- SAHNE, KAMERA VE RENDERER ---
        let scene, camera, renderer;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let moveUp = false, moveDown = false;
        let projectiles = [];

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Neşeli Gökyüzü Mavisi
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.003);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 0); // Karakterin göz seviyesi

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Işıklar
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(100, 150, 50);
            sunLight.castShadow = true;
            scene.add(sunLight);

            // Gerçekçi Şehir & Zemin
            createCity();
            createNPCs();
        }

        // --- DETAYLI ŞEHİR ÜRETİMİ ---
        function createCity() {
            // Zemin
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Yollar ve Binalar
            const bMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2 });
            const windowMat = new THREE.MeshBasicMaterial({ color: 0xffff99 });

            for (let x = -200; x <= 200; x += 40) {
                for (let z = -200; z <= 200; z += 40) {
                    if (Math.abs(x) < 20 && Math.abs(z) < 20) continue; // Doğma alanı boş kalsın

                    const h = 20 + Math.random() * 60;
                    const building = new THREE.Mesh(new THREE.BoxGeometry(25, h, 25), bMat);
                    building.position.set(x, h / 2, z);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);

                    // Pencereler (Gerçekçilik için)
                    for(let y = 5; y < h - 5; y += 8) {
                        const win = new THREE.Mesh(new THREE.PlaneGeometry(20, 3), windowMat);
                        win.position.set(x, y, z + 12.6);
                        scene.add(win);
                    }
                }
            }
        }

        // --- NPC / DİĞER KARAKTERLER ---
        function createNPCs() {
            const npcMat = new THREE.MeshStandardMaterial({ color: 0xff0055 });
            for(let i = 0; i < 15; i++) {
                const npc = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 4), npcMat);
                npc.position.set((Math.random() - 0.5) * 200, 2, (Math.random() - 0.5) * 200);
                scene.add(npc);
            }
        }

        // --- KONTROLLER (DOKUNMATİK & KLAVYE) ---
        let touchStartX = 0, touchStartY = 0;

        function setupControls() {
            // Bakış Yönü Değiştirme (Dokunup Sürükleme)
            window.addEventListener('touchstart', (e) => {
                if(e.touches[0].clientX > window.innerWidth / 2) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            });

            window.addEventListener('touchmove', (e) => {
                if(e.touches[0].clientX > window.innerWidth / 2) {
                    const deltaX = e.touches[0].clientX - touchStartX;
                    const deltaY = e.touches[0].clientY - touchStartY;

                    camera.rotation.y -= deltaX * 0.005;
                    camera.rotation.x -= deltaY * 0.005;

                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            });

            // Buton Etkileşimleri
            document.getElementById('btn-up').ontouchstart = () => moveUp = true;
            document.getElementById('btn-up').ontouchend = () => moveUp = false;
            
            document.getElementById('btn-down').ontouchstart = () => moveDown = true;
            document.getElementById('btn-down').ontouchend = () => moveDown = false;

            document.getElementById('btn-shoot').ontouchstart = shootElement;
        }

        // Element Ateşleme
        function shootElement() {
            const projGeo = new THREE.SphereGeometry(1.2, 16, 16);
            const projMat = new THREE.MeshBasicMaterial({ color: selectedChar.color });
            const proj = new THREE.Mesh(projGeo, projMat);

            proj.position.copy(camera.position);
            
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            proj.userData = { velocity: dir.multiplyScalar(2) };

            scene.add(proj);
            projectiles.push(proj);
        }

        // --- OYUNU BAŞLAT ---
        function startGame() {
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';

            initScene();
            setupControls();
            animate();
        }

        // --- OYUN DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            // Uçma / Dikey Hareket
            if (moveUp) camera.position.y += 0.5;
            if (moveDown && camera.position.y > 2) camera.position.y -= 0.5;

            // Mermi / Element Hareketleri
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.position.add(p.userData.velocity);

                if (p.position.distanceTo(camera.position) > 200) {
                    scene.remove(p);
                    projectiles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // Ekran Boyutu Değişimi
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
