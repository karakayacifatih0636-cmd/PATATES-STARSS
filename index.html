<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Element Savaşları - Gelişmiş Şehir</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Lilita One', cursive, sans-serif;
            background-color: #87ceeb;
        }

        /* --- MENÜ --- */
        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2b78ff 0%, #002266 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .top-bar {
            position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px;
            display: flex; justify-content: space-between; background: rgba(0, 0, 0, 0.4);
            border-bottom: 3px solid rgba(255, 255, 255, 0.2); z-index: 1001;
        }
        .profile-name { color: white; font-size: 24px; text-shadow: 2px 2px 0 #000; }
        .coins { color: #ffcc00; font-size: 24px; text-shadow: 2px 2px 0 #000; }

        .menu-title {
            font-size: 3.5rem; color: #fff;
            text-shadow: 0px 6px 0px #003399, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 2px 2px 0px #000;
            margin-bottom: 20px; text-align: center; letter-spacing: 2px; transform: skew(-5deg);
        }

        .character-select-container {
            display: flex; gap: 15px; overflow-x: auto; width: 90%; max-width: 800px; padding: 15px;
            background: rgba(0, 0, 0, 0.5); border-radius: 15px; border: 3px solid #4d94ff;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8); min-height: 140px; align-items: center; justify-content: flex-start;
        }

        .char-card {
            min-width: 90px; height: 110px; background: #2a2a2a; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #111; cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0px #111; flex-shrink: 0;
        }

        .char-card.selected {
            border-color: #66ff33; background: #f0f0f0; transform: scale(1.05) translateY(-5px);
            box-shadow: 0 8px 0px #339900;
        }
        .char-card.selected .char-name { color: #000; text-shadow: none; }
        .char-icon { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #000; margin-bottom: 6px; }
        .char-name { font-size: 14px; color: #fff; text-shadow: 1px 1px 0 #000; }

        .btn-play {
            position: absolute; bottom: 30px; right: 30px; width: 200px; height: 75px;
            background: linear-gradient(180deg, #ffeb3b 0%, #ff9800 100%);
            border: 4px solid #fff; border-radius: 15px; font-size: 2.5rem;
            font-family: 'Lilita One', cursive; color: #fff;
            text-shadow: 3px 3px 0px #cc5200; box-shadow: 0 8px 0px #cc5200;
            cursor: pointer; z-index: 1001;
        }

        /* --- OYUN ARAYÜZÜ --- */
        #game-ui {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .health-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 280px; height: 30px; background: rgba(0,0,0,0.6);
            border: 3px solid #fff; border-radius: 15px; padding: 3px;
            pointer-events: none;
        }
        .health-bar-fill {
            width: 100%; height: 100%; background: linear-gradient(180deg, #00ff66 0%, #009933 100%);
            border-radius: 10px; transition: width 0.1s linear;
        }
        .health-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 16px; text-shadow: 2px 2px 0 #000;
        }

        .crosshair {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
            background: rgba(255, 255, 255, 0.9); border: 3px solid #000; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }

        #blind-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
        }

        .damage-pop {
            position: absolute; color: #ff2222; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 0px #000, -1px -1px 0px #000;
            pointer-events: none; z-index: 500;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -40px) scale(0.8); }
        }

        .npc-hp-bar {
            position: absolute; width: 60px; height: 8px; background: rgba(0,0,0,0.7);
            border: 1px solid #fff; border-radius: 4px; pointer-events: none; z-index: 400;
            transform: translate(-50%, -50%); display: none;
        }
        .npc-hp-fill {
            width: 100%; height: 100%; background: #00ff44; border-radius: 3px;
        }

        /* JOYSTICK & DOKUNMA ALANLARI */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px;
            background: rgba(0, 0, 0, 0.3); border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%; pointer-events: auto; backdrop-filter: blur(2px); z-index: 200;
        }

        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            background: linear-gradient(135deg, #ffffff, #cccccc); border: 3px solid #000;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }

        .touch-btn {
            position: absolute; border: 4px solid #000; border-radius: 50%; pointer-events: auto;
            display: flex; justify-content: center; align-items: center; text-align: center;
            color: white; font-size: 12px; text-shadow: 2px 2px 0px #000; line-height: 1.1;
            box-shadow: 0 6px 0px #000; cursor: pointer; z-index: 200;
        }
        #btn-jump-mobile { bottom: 40px; right: 40px; width: 85px; height: 85px; font-size: 18px; background: linear-gradient(180deg, #66ccff 0%, #0066cc 100%); }
        #btn-shoot-mobile { bottom: 140px; right: 40px; width: 75px; height: 75px; font-size: 15px; background: linear-gradient(180deg, #ff6666 0%, #cc0000 100%); }
        #btn-punch-mobile { bottom: 230px; right: 40px; width: 70px; height: 70px; font-size: 14px; background: linear-gradient(180deg, #ffaa00 0%, #995500 100%); }

        #btn-q-mobile { bottom: 140px; right: 130px; width: 75px; height: 75px; background: linear-gradient(180deg, #aa00ff 0%, #440088 100%); display: none; }
        #btn-r-mobile { bottom: 230px; right: 130px; width: 75px; height: 75px; background: linear-gradient(180deg, #00e5ff 0%, #006688 100%); display: none; }
        
        /* MOBİL KAMERA SÜRÜKLEME ALANI */
        #touch-look-zone {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: auto; z-index: 50;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-overlay">
        <div class="top-bar">
            <div class="profile-name">ElementUstasi</div>
            <div class="coins">🪙 3500</div>
        </div>
        <div class="menu-title">ELEMENT<br>SAVAŞLARI</div>
        <div class="character-select-container" id="char-container"></div>
        <button class="btn-play" id="btn-start">OYNA</button>
    </div>

    <div id="game-ui">
        <div id="touch-look-zone"></div>
        <div id="blind-overlay"></div>
        <div class="health-bar-container">
            <div class="health-bar-fill" id="hp-fill"></div>
            <div class="health-text" id="hp-text">CAN: 1000 / 1000</div>
        </div>
        <div class="crosshair"></div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="npc-bars-holder"></div>
        
        <div class="touch-btn" id="btn-q-mobile">ÖZEL Q</div>
        <div class="touch-btn" id="btn-r-mobile">ÖZEL R</div>
        <div class="touch-btn" id="btn-punch-mobile">YUMRUK<br>(F)</div>
        <div class="touch-btn" id="btn-shoot-mobile">ATEŞ<br>(E)</div>
        <div class="touch-btn" id="btn-jump-mobile">ZIPLA</div>
    </div>

    <script>
        const CHARACTERS = [
            { name: "Ateş", color: 0xff3300, icon: "#ff3300" },
            { name: "Su", color: 0x0099ff, icon: "#0099ff" },
            { name: "Hava", color: 0x99ffff, icon: "#99ffff" },
            { name: "Toprak", color: 0x8b5a2b, icon: "#8b5a2b" },
            { name: "Şimşek", color: 0xffff00, icon: "#ffff00" },
            { name: "Buz", color: 0x00ffff, icon: "#00ffff" },
            { name: "Gölge", color: 0x4b0082, icon: "#4b0082" },
            { name: "Işık", color: 0xfff8dc, icon: "#fff8dc" },
            { name: "Doğa", color: 0x228b22, icon: "#228b22" },
            { name: "Lav", color: 0xff4500, icon: "#ff4500" }
        ];

        let selectedChar = CHARACTERS[0];
        let maxHP = 1000, playerHP = 1000;
        let isGameOver = false;

        let isIceShieldActive = false, iceShieldEndTime = 0;
        let isBlinded = false, blindEndTime = 0;

        let scene, camera, renderer;
        let keys = { w: false, a: false, s: false, d: false, q: false, r: false, f: false, e: false };
        let projectiles = [], cityObjects = [], collidableBoxes = [];
        let npcs = [];
        let cooldowns = { q: 0, r: 0 };

        let fistMesh;
        let isPunching = false, punchProgress = 0;
        let shadowTeleportRing = null;

        // Işık Lazeri
        let isLightLaserActive = false;
        let lightLaserMesh = null;

        let yaw = 0, pitch = 0;
        let playerVelocityY = 0, isGrounded = true;
        const gravity = -0.02, jumpStrength = 0.48, playerHeight = 3.5;
        let joyX = 0, joyY = 0;

        function updateUIButtons() {
            const btnQ = document.getElementById('btn-q-mobile');
            const btnR = document.getElementById('btn-r-mobile');
            btnQ.style.display = "flex"; btnR.style.display = "flex";
            btnQ.innerText = `${selectedChar.name.toUpperCase()}\n(Q)`;
            btnR.innerText = `GÜÇ\n(R)`;
        }

        function renderCharacterCards() {
            const charContainer = document.getElementById('char-container');
            if(!charContainer) return;
            charContainer.innerHTML = '';
            CHARACTERS.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = `char-card ${index === 0 ? 'selected' : ''}`;
                card.onclick = () => {
                    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedChar = char;
                    updateUIButtons();
                };
                const icon = document.createElement('div'); icon.className = 'char-icon'; icon.style.background = char.icon;
                const name = document.createElement('div'); name.className = 'char-name'; name.innerText = char.name;
                card.appendChild(icon); card.appendChild(name); charContainer.appendChild(card);
            });
        }
        renderCharacterCards();

        function createDamageText(pos3D, amount) {
            const vector = pos3D.clone();
            vector.y += 2.5;
            vector.project(camera);

            if (vector.z > 1) return;

            const x = (vector.x * .5 + .5) * window.innerWidth;
            const y = (-(vector.y * .5) + .5) * window.innerHeight;

            const pop = document.createElement('div');
            pop.className = 'damage-pop';
            pop.innerText = `-${Math.round(amount)}`;
            pop.style.left = `${x}px`;
            pop.style.top = `${y}px`;
            document.body.appendChild(pop);

            setTimeout(() => pop.remove(), 800);
        }

        function initScene() {
            if (renderer) {
                document.body.removeChild(renderer.domElement);
            }

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.0015);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 0);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.85); 
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xfff5ea, 1.4); 
            sunLight.position.set(200, 400, 150);
            sunLight.castShadow = true; 
            scene.add(sunLight);

            const fistGeo = new THREE.BoxGeometry(0.3, 0.3, 0.8);
            const fistMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });
            fistMesh = new THREE.Mesh(fistGeo, fistMat);
            fistMesh.position.set(0.6, -0.4, -0.8);
            camera.add(fistMesh);
            scene.add(camera);

            // Gölge Işınlanma Halka Efekti
            const ringGeo = new THREE.RingGeometry(1.5, 2, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x8800ff, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
            shadowTeleportRing = new THREE.Mesh(ringGeo, ringMat);
            shadowTeleportRing.rotation.x = -Math.PI / 2;
            shadowTeleportRing.visible = false;
            scene.add(shadowTeleportRing);

            // Işık Lazeri
            const laserGeo = new THREE.CylinderGeometry(0.2, 0.2, 100, 16);
            const laserMat = new THREE.MeshBasicMaterial({ color: 0xffffaa, transparent: true, opacity: 0.9 });
            lightLaserMesh = new THREE.Mesh(laserGeo, laserMat);
            lightLaserMesh.visible = false;
            scene.add(lightLaserMesh);

            createOriginalDetailedCity();
            spawn20SmartNPCs();
        }

        function checkCollision(newPos) {
            const playerRadius = 0.8;
            const playerMinY = newPos.y - playerHeight + 0.2;
            const playerMaxY = newPos.y + 0.5;

            for (let i = 0; i < collidableBoxes.length; i++) {
                const box = collidableBoxes[i];
                if (playerMaxY >= box.min.y && playerMinY <= box.max.y) {
                    if (newPos.x + playerRadius > box.min.x && newPos.x - playerRadius < box.max.x &&
                        newPos.z + playerRadius > box.min.z && newPos.z - playerRadius < box.max.z) {
                        return true;
                    }
                }
            }
            return false;
        }

        /* --- ORİJİNAL ZENGİN VE CANLI ŞEHİR HARİTASI --- */
        function createOriginalDetailedCity() {
            collidableBoxes = []; cityObjects = [];

            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a3f47, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1200, 1200), groundMat);
            ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
            scene.add(ground); cityObjects.push(ground);

            const roadMat = new THREE.MeshStandardMaterial({ color: 0x22252a, roughness: 0.5 });
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x99a3a4, roughness: 0.6 });
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.9 });

            for (let r = -300; r <= 300; r += 120) {
                const roadX = new THREE.Mesh(new THREE.PlaneGeometry(1200, 20), roadMat);
                roadX.rotation.x = -Math.PI / 2; roadX.position.set(0, 0.05, r); scene.add(roadX);

                const roadZ = new THREE.Mesh(new THREE.PlaneGeometry(20, 1200), roadMat);
                roadZ.rotation.x = -Math.PI / 2; roadZ.position.set(r, 0.05, 0); scene.add(roadZ);

                const sideX1 = new THREE.Mesh(new THREE.BoxGeometry(1200, 0.4, 4), sidewalkMat);
                sideX1.position.set(0, 0.2, r + 12); scene.add(sideX1);
                const sideX2 = new THREE.Mesh(new THREE.BoxGeometry(1200, 0.4, 4), sidewalkMat);
                sideX2.position.set(0, 0.2, r - 12); scene.add(sideX2);

                for(let l = -550; l <= 550; l += 30) {
                    const lineX = new THREE.Mesh(new THREE.PlaneGeometry(10, 1), lineMat);
                    lineX.rotation.x = -Math.PI / 2; lineX.position.set(l, 0.08, r); scene.add(lineX);
                }
            }

            const parkArea = new THREE.Mesh(new THREE.BoxGeometry(100, 0.3, 100), grassMat);
            parkArea.position.set(0, 0.15, 0); scene.add(parkArea);

            const bMaterials = [
                new THREE.MeshStandardMaterial({ color: 0x34495e, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0x8e44ad, roughness: 0.2 }),
                new THREE.MeshStandardMaterial({ color: 0x2980b9, roughness: 0.4 }),
                new THREE.MeshStandardMaterial({ color: 0xd35400, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0x27ae60, roughness: 0.2 })
            ];

            const gridSpacing = 70;
            for (let bx = -260; bx <= 260; bx += gridSpacing) {
                for (let bz = -260; bz <= 260; bz += gridSpacing) {
                    if (Math.abs(bx) < 50 && Math.abs(bz) < 50) continue;

                    const bh = 35 + Math.random() * 60;
                    const bw = 26, bd = 26;

                    const bMat = bMaterials[Math.floor(Math.random() * bMaterials.length)];
                    const building = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), bMat);
                    building.position.set(bx, bh / 2, bz);
                    building.castShadow = true; building.receiveShadow = true;
                    scene.add(building); cityObjects.push(building);
                    collidableBoxes.push(new THREE.Box3().setFromObject(building));
                }
            }
        }

        /* --- GERÇEKÇİ İNSANSI BOT MODELİ (DETAYLI MODEL) --- */
        function createSingleNPC(char) {
            const npcGroup = new THREE.Group();

            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.5 });
            const clothesMat = new THREE.MeshStandardMaterial({ color: char.color, roughness: 0.3 });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });

            // 1. Gövde ve Ceket
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.5, 0.6), clothesMat);
            torso.position.y = 1.95; npcGroup.add(torso);

            // 2. Kafa & Yüz Detayları
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 16), skinMat);
            head.position.y = 3.0; npcGroup.add(head);

            const hair = new THREE.Mesh(new THREE.ConeGeometry(0.42, 0.3, 16), darkMat);
            hair.position.y = 3.3; npcGroup.add(hair);

            const eyeGeo = new THREE.SphereGeometry(0.06, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.12, 3.05, 0.35); npcGroup.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.12, 3.05, 0.35); npcGroup.add(eyeR);

            // 3. Eklemli Bacaklar ve Ayakkabılar
            const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.16, 1.2, 12), darkMat);
            legL.position.set(-0.28, 0.6, 0); npcGroup.add(legL);

            const legR = legL.clone(); legR.position.set(0.28, 0.6, 0); npcGroup.add(legR);

            const shoeGeo = new THREE.BoxGeometry(0.25, 0.2, 0.45);
            const shoeL = new THREE.Mesh(shoeGeo, darkMat); shoeL.position.set(-0.28, 0.1, 0.1); npcGroup.add(shoeL);
            const shoeR = shoeL.clone(); shoeR.position.set(0.28, 0.1, 0.1); npcGroup.add(shoeR);

            // 4. Eklemli Kollar ve Eller
            const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.14, 1.2, 12), clothesMat);
            armL.position.set(-0.72, 1.9, 0); armL.rotation.z = 0.1; npcGroup.add(armL);

            const armR = armL.clone(); armR.position.set(0.72, 1.9, 0); armR.rotation.z = -0.1; npcGroup.add(armR);

            const handGeo = new THREE.SphereGeometry(0.12, 8, 8);
            const handL = new THREE.Mesh(handGeo, skinMat); handL.position.set(-0.75, 1.2, 0); npcGroup.add(handL);
            const handR = handL.clone(); handR.position.set(0.75, 1.2, 0); npcGroup.add(handR);

            let rx = (Math.random() - 0.5) * 280;
            let rz = (Math.random() - 0.5) * 280;
            
            // BOTLARIN KESİNLİKLE HARİTA ALTINA İNMEYECEK YERLEŞİMİ (Y = 0)
            npcGroup.position.set(rx, 0, rz);

            scene.add(npcGroup);

            const hpBar = document.createElement('div');
            hpBar.className = 'npc-hp-bar';
            const hpFill = document.createElement('div');
            hpFill.className = 'npc-hp-fill';
            hpBar.appendChild(hpFill);
            document.getElementById('npc-bars-holder').appendChild(hpBar);

            return {
                mesh: npcGroup,
                element: char,
                hp: 1000, maxHp: 1000,
                hpBarEl: hpBar,
                hpFillEl: hpFill,
                lastAttack: 0, lastSkillQ: 0, lastSkillR: 0,
                isDead: false, deathProgress: 0,
                isStunned: false, stunEndTime: 0,
                strafeDir: Math.random() > 0.5 ? 1 : -1
            };
        }

        function spawn20SmartNPCs() {
            document.getElementById('npc-bars-holder').innerHTML = '';
            npcs = [];
            CHARACTERS.forEach((char) => {
                for (let i = 0; i < 2; i++) {
                    npcs.push(createSingleNPC(char));
                }
            });
        }

        function killNPC(npc) {
            if (npc.isDead) return;
            npc.isDead = true;
            npc.deathProgress = 0;
            npc.hpBarEl.style.display = 'none';

            setTimeout(() => {
                let rx = (Math.random() - 0.5) * 280;
                let rz = (Math.random() - 0.5) * 280;
                npc.mesh.position.set(rx, 0, rz);
                npc.mesh.rotation.set(0, 0, 0);
                npc.hp = 1000;
                npc.isDead = false;
                npc.deathProgress = 0;
            }, 5000);
        }

        function triggerGameOver() {
            if (isGameOver) return;
            isGameOver = true;
            alert("ÖLDÜNÜZ! Ana Menüye Dönülüyor...");

            document.exitPointerLock?.();
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('menu-overlay').style.display = 'flex';
        }

        function applyDamageToNPC(npc, amount) {
            npc.hp -= amount;
            createDamageText(npc.mesh.position, amount);
            if (npc.hp <= 0) killNPC(npc);
        }

        function applyDamageToPlayer(amount) {
            if (isGameOver) return;
            let finalDmg = amount;
            if (isIceShieldActive) finalDmg *= 0.5;

            playerHP -= finalDmg;
            createDamageText(camera.position, finalDmg);

            if (playerHP <= 0) {
                playerHP = 0;
                triggerGameOver();
            }
        }

        function executePunch() {
            if (isPunching || isGameOver) return;
            isPunching = true; punchProgress = 0;

            npcs.forEach(npc => {
                if (!npc.isDead && camera.position.distanceTo(npc.mesh.position) < 4.5) {
                    applyDamageToNPC(npc, 120);
                }
            });
        }

        /* --- TEMEL SALDIRI (E TUŞU ATEŞ ETME) --- */
        function shootElement() {
            if (isGameOver) return;
            const projGeo = new THREE.SphereGeometry(1.2, 16, 16);
            const projMat = new THREE.MeshBasicMaterial({ color: selectedChar.color });
            const proj = new THREE.Mesh(projGeo, projMat);
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            proj.position.copy(camera.position).addScaledVector(dir, 2);
            proj.userData = { velocity: dir.multiplyScalar(3.0), damage: 100, owner: 'player' };
            scene.add(proj); projectiles.push(proj);
        }

        /* --- Q VE R ÖZEL YETENEKLERİ --- */
        function triggerAbilityQ() {
            if (isGameOver) return;
            const now = Date.now();

            if (selectedChar.name === "Işık") {
                // Işık elementi için cooldown yok! (basılı tutma / dokunma çalışıyor)
                return; 
            }

            if (now < cooldowns.q) return;

            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);

            if (selectedChar.name === "Ateş") {
                for(let i = -2; i <= 2; i++) {
                    const pGeo = new THREE.SphereGeometry(1.8, 16, 16);
                    const pMat = new THREE.MeshBasicMaterial({ color: 0xff3300 });
                    const p = new THREE.Mesh(pGeo, pMat);
                    const spreadDir = dir.clone().applyAxisAngle(new THREE.Vector3(0,1,0), i * 0.15);
                    p.position.copy(camera.position).addScaledVector(spreadDir, 2);
                    p.userData = { velocity: spreadDir.multiplyScalar(2.5), damage: 130, owner: 'player' };
                    scene.add(p); projectiles.push(p);
                }
                cooldowns.q = now + 3500;
            }
            else if (selectedChar.name === "Su") {
                const pGeo = new THREE.CylinderGeometry(1.5, 0.5, 6, 16);
                const pMat = new THREE.MeshBasicMaterial({ color: 0x0099ff, transparent: true, opacity: 0.8 });
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.copy(camera.position).addScaledVector(dir, 3);
                p.userData = { velocity: dir.multiplyScalar(2.0), damage: 150, owner: 'player' };
                scene.add(p); projectiles.push(p);
                cooldowns.q = now + 4000;
            }
            else if (selectedChar.name === "Buz") {
                const wallGroup = new THREE.Group();
                for (let i = -3; i <= 3; i++) {
                    const spikeGeo = new THREE.ConeGeometry(1.2, 7 + Math.random() * 3, 5);
                    const spikeMat = new THREE.MeshStandardMaterial({ color: 0x88ffff, transparent: true, opacity: 0.85 });
                    const spike = new THREE.Mesh(spikeGeo, spikeMat);
                    spike.position.set(i * 1.5, 3.5, 0);
                    wallGroup.add(spike);
                }
                const spawnPos = camera.position.clone().addScaledVector(dir, 5);
                wallGroup.position.set(spawnPos.x, 0, spawnPos.z);
                scene.add(wallGroup);
                
                const box = new THREE.Box3().setFromObject(wallGroup);
                collidableBoxes.push(box);
                setTimeout(() => { scene.remove(wallGroup); collidableBoxes = collidableBoxes.filter(b => b !== box); }, 8000);
                cooldowns.q = now + 6000;
            } 
            else if (selectedChar.name === "Gölge") {
                if (shadowTeleportRing.visible) {
                    camera.position.x = shadowTeleportRing.position.x;
                    camera.position.z = shadowTeleportRing.position.z;
                    cooldowns.q = now + 4000;
                }
            } 
            else if (selectedChar.name === "Şimşek") {
                const raycaster = new THREE.Raycaster(camera.position, dir);
                const hits = raycaster.intersectObjects(cityObjects, true);
                let targetPoint = camera.position.clone().addScaledVector(dir, 40);
                if(hits.length > 0) targetPoint = hits[0].point;

                const boltGeo = new THREE.CylinderGeometry(0.3, 0.3, 60, 8);
                const boltMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                const bolt = new THREE.Mesh(boltGeo, boltMat);
                bolt.position.copy(targetPoint); bolt.position.y += 30;
                scene.add(bolt);
                setTimeout(() => scene.remove(bolt), 200);

                npcs.forEach(npc => {
                    if(!npc.isDead && npc.mesh.position.distanceTo(targetPoint) < 8) {
                        applyDamageToNPC(npc, 200);
                    }
                });
                cooldowns.q = now + 4000;
            }
            else {
                shootElement();
                cooldowns.q = now + 2500;
            }
        }

        function triggerAbilityR() {
            if (isGameOver) return;
            const now = Date.now();
            if (now < cooldowns.r) return;

            if (selectedChar.name === "Buz") {
                isIceShieldActive = true;
                iceShieldEndTime = now + 6000;
                cooldowns.r = now + 14000;
            } 
            else if (selectedChar.name === "Gölge" || selectedChar.name === "Ateş" || selectedChar.name === "Lav") {
                shootBigSphere(selectedChar.color, 5000, 220, 'player');
                cooldowns.r = now + 10000;
            } 
            else if (selectedChar.name === "Işık") {
                isBlinded = true;
                blindEndTime = now + 4000;
                npcs.forEach(npc => {
                    if (!npc.isDead && camera.position.distanceTo(npc.mesh.position) < 30) {
                        applyDamageToNPC(npc, 160);
                        npc.isStunned = true; npc.stunEndTime = Date.now() + 4000;
                    }
                });
                cooldowns.r = now + 10000;
            }
            else if (selectedChar.name === "Doğa") {
                playerHP = Math.min(maxHP, playerHP + 300);
                createDamageText(camera.position, -300);
                cooldowns.r = now + 12000;
            }
        }

        function shootBigSphere(colorHex, blindDuration, damage, owner) {
            const dir = new THREE.Vector3(); 
            if(owner === 'player') camera.getWorldDirection(dir);
            else dir.copy(owner.targetDir);

            const sphereGeo = new THREE.SphereGeometry(3.5, 32, 32);
            const sphereMat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.85 });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            
            const startPos = owner === 'player' ? camera.position.clone() : owner.mesh.position.clone().add(new THREE.Vector3(0, 2, 0));
            sphere.position.copy(startPos).addScaledVector(dir, 3);
            sphere.userData = { velocity: dir.multiplyScalar(2.0), blindDuration: blindDuration, damage: damage, owner: owner };
            scene.add(sphere); projectiles.push(sphere);
        }

        function setupControls() {
            window.addEventListener('click', () => {
                if (!isGameOver && document.pointerLockElement !== document.body) {
                    document.body.requestPointerLock();
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isGameOver && document.pointerLockElement === document.body) {
                    yaw -= e.movementX * 0.0025;
                    pitch -= e.movementY * 0.0025;
                    pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
                    camera.rotation.y = yaw; camera.rotation.x = pitch;
                }
            });

            window.addEventListener('keydown', (e) => {
                if (isGameOver) return;
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = true; if (key === 's') keys.s = true;
                if (key === 'a') keys.a = true; if (key === 'd') keys.d = true;
                if (key === 'e') shootElement();
                if (key === 'q') {
                    if (selectedChar.name === "Işık") isLightLaserActive = true;
                    else triggerAbilityQ();
                }
                if (key === 'r') triggerAbilityR();
                if (key === 'f') executePunch();
                if (e.code === 'Space') jump();
            });

            window.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = false; if (key === 's') keys.s = false;
                if (key === 'a') keys.a = false; if (key === 'd') keys.d = false;
                if (key === 'q' && selectedChar.name === "Işık") isLightLaserActive = false;
            });

            /* --- MOBİL KAMERA DÖNDÜRME VE DOKUNMA MANTIĞI --- */
            let touchLookId = null;
            let lastTouchX = 0, lastTouchY = 0;

            const lookZone = document.getElementById('touch-look-zone');
            lookZone.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.clientX > window.innerWidth / 3 && touchLookId === null) {
                        touchLookId = t.identifier;
                        lastTouchX = t.clientX;
                        lastTouchY = t.clientY;
                    }
                }
            }, { passive: false });

            lookZone.addEventListener('touchmove', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === touchLookId) {
                        const dx = t.clientX - lastTouchX;
                        const dy = t.clientY - lastTouchY;
                        yaw -= dx * 0.005;
                        pitch -= dy * 0.005;
                        pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
                        camera.rotation.y = yaw; camera.rotation.x = pitch;
                        lastTouchX = t.clientX;
                        lastTouchY = t.clientY;
                    }
                }
            }, { passive: false });

            lookZone.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === touchLookId) {
                        touchLookId = null;
                    }
                }
            }, { passive: false });

            const joyZone = document.getElementById('joystick-zone');
            const joyKnob = document.getElementById('joystick-knob');
            let joyActive = false, joyCenter = { x: 0, y: 0 };

            function handleJoyStart(e) {
                e.preventDefault(); e.stopPropagation(); joyActive = true;
                const rect = joyZone.getBoundingClientRect();
                joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                updateJoy(e.touches ? e.touches[0] : e);
            }
            function handleJoyMove(e) { if (!joyActive) return; e.preventDefault(); e.stopPropagation(); updateJoy(e.touches ? e.touches[0] : e); }
            function handleJoyEnd(e) {
                e.preventDefault(); e.stopPropagation(); joyActive = false;
                joyKnob.style.transform = `translate(-50%, -50%)`; joyX = 0; joyY = 0;
            }
            function updateJoy(input) {
                let dx = input.clientX - joyCenter.x; let dy = input.clientY - joyCenter.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 45) { dx = (dx / dist) * 45; dy = (dy / dist) * 45; }
                joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joyX = dx / 45; joyY = dy / 45;
            }

            joyZone.addEventListener('touchstart', handleJoyStart, { passive: false });
            joyZone.addEventListener('touchmove', handleJoyMove, { passive: false });
            joyZone.addEventListener('touchend', handleJoyEnd, { passive: false });

            function bindBtn(id, action) {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); action(); }, { passive: false });
            }

            bindBtn('btn-shoot-mobile', () => shootElement());
            bindBtn('btn-punch-mobile', () => executePunch());
            bindBtn('btn-jump-mobile', () => jump());
            bindBtn('btn-q-mobile', () => {
                if(selectedChar.name === "Işık") {
                    isLightLaserActive = !isLightLaserActive;
                } else {
                    triggerAbilityQ();
                }
            });
            bindBtn('btn-r-mobile', () => triggerAbilityR());
        }

        function jump() {
            if (isGrounded && !isGameOver) { playerVelocityY = jumpStrength; isGrounded = false; }
        }

        function startGame() {
            playerHP = 1000; maxHP = 1000; isGameOver = false;
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            updateUIButtons(); initScene(); setupControls(); animate();
        }
        document.getElementById('btn-start').addEventListener('click', startGame);

        /* --- ANA OYUN DÖNGÜSÜ --- */
        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            const now = Date.now();

            if (isIceShieldActive && now > iceShieldEndTime) isIceShieldActive = false;

            if (isBlinded) {
                document.getElementById('blind-overlay').style.opacity = '1';
                if (now > blindEndTime) isBlinded = false;
            } else {
                document.getElementById('blind-overlay').style.opacity = '0';
            }

            // Gölge Işınlanma Halka Tespiti
            if (selectedChar.name === "Gölge") {
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                const raycaster = new THREE.Raycaster(camera.position, dir);
                const hits = raycaster.intersectObjects(cityObjects, true);
                if (hits.length > 0 && hits[0].distance <= 35) {
                    shadowTeleportRing.position.copy(hits[0].point);
                    shadowTeleportRing.position.y += 0.1;
                    shadowTeleportRing.visible = true;
                } else shadowTeleportRing.visible = false;
            } else if (shadowTeleportRing) shadowTeleportRing.visible = false;

            // Işık Lazeri Q (BEKLEME SÜRESİZ KESİNTİSİZ LAZER)
            if (selectedChar.name === "Işık" && isLightLaserActive) {
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                lightLaserMesh.position.copy(camera.position).addScaledVector(dir, 50);
                lightLaserMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                lightLaserMesh.visible = true;

                npcs.forEach(npc => {
                    if (!npc.isDead && camera.position.distanceTo(npc.mesh.position) < 60) {
                        applyDamageToNPC(npc, 5);
                    }
                });
            } else if (lightLaserMesh) {
                lightLaserMesh.visible = false;
            }

            if (isPunching) {
                punchProgress += 0.15;
                fistMesh.position.z = -0.8 - Math.sin(punchProgress * Math.PI) * 0.6;
                if (punchProgress >= 1) { isPunching = false; fistMesh.position.z = -0.8; }
            }

            // Oyuncu Hareketi
            let moveX = joyX, moveZ = joyY;
            if (keys.w) moveZ = -1; if (keys.s) moveZ = 1;
            if (keys.a) moveX = -1; if (keys.d) moveX = 1;

            const forward = new THREE.Vector3(); camera.getWorldDirection(forward); forward.y = 0; forward.normalize();
            const side = new THREE.Vector3(); side.crossVectors(camera.up, forward).negate();

            if (Math.abs(moveX) > 0.05 || Math.abs(moveZ) > 0.05) {
                const targetPos = camera.position.clone()
                    .addScaledVector(forward, -moveZ * 0.45)
                    .addScaledVector(side, moveX * 0.45);
                if (!checkCollision(targetPos)) camera.position.copy(targetPos);
            }

            camera.position.y += playerVelocityY;
            playerVelocityY += gravity;
            if (camera.position.y <= playerHeight) { camera.position.y = playerHeight; playerVelocityY = 0; isGrounded = true; }

            /* --- NPC HAREKETİ & KONTROLÜ (BUG FIX: YENİDEN YERİN ALTINA GİRMEME KORUMASI) --- */
            npcs.forEach(npc => {
                if (npc.isDead) {
                    if (npc.deathProgress < 1) {
                        npc.deathProgress += 0.05;
                        npc.mesh.rotation.z = Math.min(Math.PI / 2, npc.deathProgress * (Math.PI / 2));
                    }
                    npc.hpBarEl.style.display = 'none';
                    return;
                }

                // YERİN ALTINA DÜŞMEYİ ENGELLEYEN SABİT KOORDİNAT SIFIRLAMASI
                npc.mesh.position.y = 0;

                const npcVec = npc.mesh.position.clone();
                npcVec.y += 3.5;
                npcVec.project(camera);

                if (npcVec.z <= 1) {
                    const nx = (npcVec.x * .5 + .5) * window.innerWidth;
                    const ny = (-(npcVec.y * .5) + .5) * window.innerHeight;
                    npc.hpBarEl.style.left = `${nx}px`;
                    npc.hpBarEl.style.top = `${ny}px`;
                    npc.hpBarEl.style.display = 'block';
                    npc.hpFillEl.style.width = `${(npc.hp / npc.maxHp) * 100}%`;
                } else {
                    npc.hpBarEl.style.display = 'none';
                }

                if (npc.isStunned) {
                    if (now > npc.stunEndTime) npc.isStunned = false;
                    return;
                }

                let targetPos = camera.position;
                let minDist = npc.mesh.position.distanceTo(camera.position);

                npcs.forEach(otherNpc => {
                    if (otherNpc !== npc && !otherNpc.isDead && otherNpc.element.name !== npc.element.name) {
                        const dist = npc.mesh.position.distanceTo(otherNpc.mesh.position);
                        if (dist < minDist) {
                            minDist = dist;
                            targetPos = otherNpc.mesh.position;
                        }
                    }
                });

                npc.mesh.lookAt(targetPos.x, 0, targetPos.z);
                const toTarget = new THREE.Vector3().subVectors(targetPos, npc.mesh.position);
                toTarget.y = 0;
                toTarget.normalize();
                npc.targetDir = toTarget;

                const idealDistMin = 10, idealDistMax = 22;

                if (minDist > idealDistMax) {
                    npc.mesh.position.addScaledVector(toTarget, 0.22);
                } else if (minDist < idealDistMin) {
                    npc.mesh.position.addScaledVector(toTarget, -0.2);
                } else {
                    const rightDir = new THREE.Vector3().crossVectors(toTarget, new THREE.Vector3(0, 1, 0));
                    npc.mesh.position.addScaledVector(rightDir, 0.12 * npc.strafeDir);
                    if (Math.random() < 0.02) npc.strafeDir *= -1;
                }

                if (minDist <= 4 && now - npc.lastAttack > 1200) {
                    npc.lastAttack = now;
                    if (targetPos === camera.position) applyDamageToPlayer(50);
                } 
                else if (minDist <= 35 && now - npc.lastAttack > 1600) {
                    npc.lastAttack = now;
                    const pGeo = new THREE.SphereGeometry(1, 12, 12);
                    const pMat = new THREE.MeshBasicMaterial({ color: npc.element.color });
                    const p = new THREE.Mesh(pGeo, pMat);
                    p.position.copy(npc.mesh.position).add(new THREE.Vector3(0, 2, 0));
                    p.userData = { velocity: toTarget.clone().multiplyScalar(2.2), damage: 60, owner: npc };
                    scene.add(p); projectiles.push(p);
                }
            });

            /* --- MERMİ DÖNGÜSÜ --- */
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.position.add(p.userData.velocity);

                if (p.userData.owner === 'player') {
                    npcs.forEach(npc => {
                        if (!npc.isDead && p.position.distanceTo(npc.mesh.position) < 2.5) {
                            applyDamageToNPC(npc, p.userData.damage || 100);
                            scene.remove(p); projectiles.splice(i, 1);
                        }
                    });
                } else {
                    if (p.position.distanceTo(camera.position) < 2.0) {
                        applyDamageToPlayer(p.userData.damage);
                        scene.remove(p); projectiles.splice(i, 1);
                        continue;
                    }

                    npcs.forEach(targetNpc => {
                        if (targetNpc !== p.userData.owner && !targetNpc.isDead && p.position.distanceTo(targetNpc.mesh.position) < 2.5) {
                            applyDamageToNPC(targetNpc, p.userData.damage);
                            scene.remove(p); projectiles.splice(i, 1);
                        }
                    });
                }

                if (p.position.distanceTo(camera.position) > 300) { scene.remove(p); projectiles.splice(i, 1); }
            }

            document.getElementById('hp-fill').style.width = `${(playerHP / maxHP) * 100}%`;
            document.getElementById('hp-text').innerText = `CAN: ${Math.floor(playerHP)} / ${maxHP}`;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
