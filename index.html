<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Element Savaşları - PC & Mobil</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- MENÜ EKRANI --- */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        .menu-title {
            font-size: 3rem;
            color: #fff;
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
            margin-top: 20px;
            text-align: center;
        }

        .character-select-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 90%;
            padding: 20px 10px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            border: 4px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .char-card {
            min-width: 110px;
            height: 140px;
            background: #fff;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #ccc;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
        }

        .char-card.selected {
            border-color: #ffcc00;
            transform: scale(1.08);
            box-shadow: 0 8px 0px #d4a000;
        }

        .char-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .char-name {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .btn-play {
            width: 220px;
            height: 70px;
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: 4px solid #fff;
            border-radius: 35px;
            font-size: 2rem;
            color: #fff;
            font-weight: 900;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 8px 0px #cc7a00, 0 15px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            margin-bottom: 30px;
        }

        .btn-play:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #cc7a00;
        }

        /* --- OYUN İÇİ ARAYÜZ --- */
        #game-ui {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #controls-info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-overlay">
        <div class="menu-title">ELEMENT SAVAŞLARI</div>
        
        <div class="character-select-container" id="char-container"></div>

        <button class="btn-play" onclick="startGame()">OYNA</button>
    </div>

    <div id="game-ui">
        <div class="crosshair"></div>
        <div id="controls-info">
            <b>Bilgisayar Kontrolleri:</b><br>
            • <b>W, A, S, D:</b> Hareket Et<br>
            • <b>Sağ Tık + Sürükle:</b> Etrafa Bak<br>
            • <b>E Tuşu:</b> Ateş Et
        </div>
    </div>

    <script>
        // --- KARAKTER VE ELEMENT LİSTESİ ---
        const CHARACTERS = [
            { name: "Ateş", color: 0xff3300, icon: "#ff3300" },
            { name: "Su", color: 0x0099ff, icon: "#0099ff" },
            { name: "Hava", color: 0x99ffff, icon: "#99ffff" },
            { name: "Toprak", color: 0x8b5a2b, icon: "#8b5a2b" },
            { name: "Şimşek", color: 0xffff00, icon: "#ffff00" },
            { name: "Buz", color: 0x00ffff, icon: "#00ffff" },
            { name: "Gölge", color: 0x4b0082, icon: "#4b0082" },
            { name: "Işık", color: 0xfff8dc, icon: "#fff8dc" },
            { name: "Doğa", color: 0x228b22, icon: "#228b22" },
            { name: "Lav", color: 0xff4500, icon: "#ff4500" }
        ];

        let selectedChar = CHARACTERS[0];

        // Menü Karakterlerini Oluşturma
        const charContainer = document.getElementById('char-container');
        CHARACTERS.forEach((char, index) => {
            const card = document.createElement('div');
            card.className = `char-card ${index === 0 ? 'selected' : ''}`;
            card.onclick = () => {
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedChar = char;
            };

            const icon = document.createElement('div');
            icon.className = 'char-icon';
            icon.style.background = char.icon;

            const name = document.createElement('div');
            name.className = 'char-name';
            name.innerText = char.name;

            card.appendChild(icon);
            card.appendChild(name);
            charContainer.appendChild(card);
        });

        // --- SAHNE, KAMERA VE DEĞİŞKENLER ---
        let scene, camera, renderer;
        let keys = { w: false, a: false, s: false, d: false };
        let projectiles = [];
        let isRightMouseDown = false;
        let previousMousePosition = { x: 0, y: 0 };
        let yaw = 0, pitch = 0; // Kamera açıları

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.003);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 0); // İnsan göz seviyesi (Yükseklik: 2 birim)
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Sağ Tık Menüsünü Engelle (Kamera döndürme kolaylığı için)
            window.addEventListener('contextmenu', e => e.preventDefault());

            // Işıklar
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(100, 150, 50);
            sunLight.castShadow = true;
            scene.add(sunLight);

            createCity();
            createNPCs();
        }

        // --- ŞEHİR VE SOKAK DETAYLARI ---
        function createCity() {
            // Zemin
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const bMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2 });
            const windowMat = new THREE.MeshBasicMaterial({ color: 0xffff99 });

            for (let x = -200; x <= 200; x += 40) {
                for (let z = -200; z <= 200; z += 40) {
                    if (Math.abs(x) < 20 && Math.abs(z) < 20) continue;

                    const h = 20 + Math.random() * 60;
                    const building = new THREE.Mesh(new THREE.BoxGeometry(25, h, 25), bMat);
                    building.position.set(x, h / 2, z);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);

                    for(let y = 5; y < h - 5; y += 8) {
                        const win = new THREE.Mesh(new THREE.PlaneGeometry(20, 3), windowMat);
                        win.position.set(x, y, z + 12.6);
                        scene.add(win);
                    }
                }
            }
        }

        function createNPCs() {
            const npcMat = new THREE.MeshStandardMaterial({ color: 0xff0055 });
            for(let i = 0; i < 15; i++) {
                const npc = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 4), npcMat);
                npc.position.set((Math.random() - 0.5) * 200, 2, (Math.random() - 0.5) * 200);
                scene.add(npc);
            }
        }

        // --- KLAVYE VE FARE KONTROLLERİ ---
        function setupPCControls() {
            // Tuş Basmaları
            window.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = true;
                if (key === 's') keys.s = true;
                if (key === 'a') keys.a = true;
                if (key === 'd') keys.d = true;

                // E Tuşu ile Ateş Etme
                if (key === 'e') {
                    shootElement();
                }
            });

            window.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = false;
                if (key === 's') keys.s = false;
                if (key === 'a') keys.a = false;
                if (key === 'd') keys.d = false;
            });

            // Sağ Tık ile Kamerayı Çevirme
            window.addEventListener('mousedown', (e) => {
                if (e.button === 2) { // 2 = Sağ Tık
                    isRightMouseDown = true;
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (e.button === 2) {
                    isRightMouseDown = false;
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isRightMouseDown) return;

                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                yaw -= deltaX * 0.003;
                pitch -= deltaY * 0.003;

                // Yukarı/aşağı bakışı sınırla
                pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));

                camera.rotation.y = yaw;
                camera.rotation.x = pitch;

                previousMousePosition = { x: e.clientX, y: e.clientY };
            });
        }

        // Ateş Etme Mekaniği
        function shootElement() {
            const projGeo = new THREE.SphereGeometry(1.2, 16, 16);
            const projMat = new THREE.MeshBasicMaterial({ color: selectedChar.color });
            const proj = new THREE.Mesh(projGeo, projMat);

            proj.position.copy(camera.position);
            
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            proj.userData = { velocity: dir.multiplyScalar(2) };

            scene.add(proj);
            projectiles.push(proj);
        }

        // --- OYUNU BAŞLAT ---
        function startGame() {
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';

            initScene();
            setupPCControls();
            animate();
        }

        // --- OYUN DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            // WASD Hareket Mantığı
            const moveSpeed = 0.4;
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0; // Yüksekliği sıfırla (Uçmayı engeller)
            forward.normalize();

            const side = new THREE.Vector3();
            side.crossVectors(camera.up, forward).negate();

            if (keys.w) camera.position.addScaledVector(forward, moveSpeed);
            if (keys.s) camera.position.addScaledVector(forward, -moveSpeed);
            if (keys.d) camera.position.addScaledVector(side, moveSpeed);
            if (keys.a) camera.position.addScaledVector(side, -moveSpeed);

            // Karakter Yüksekliğini Sabit Tut (Yürüme Mesafesi)
            camera.position.y = 2;

            // Element Mermilerini Hareket Ettir
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.position.add(p.userData.velocity);

                if (p.position.distanceTo(camera.position) > 200) {
                    scene.remove(p);
                    projectiles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // Yeniden Boyutlandırma
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
