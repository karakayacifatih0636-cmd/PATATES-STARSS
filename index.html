<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Element Savaşları - Brawl Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Mobilde istenmeyen kaydırmaları engeller */
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Lilita One', cursive, sans-serif;
            background-color: #000;
        }

        /* --- BRAWL STARS TARZI MENÜ --- */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2b78ff 0%, #002266 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 20px, transparent 20px, transparent 40px);
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 3px solid rgba(255, 255, 255, 0.2);
        }
        .profile-name { color: white; font-size: 24px; text-shadow: 2px 2px 0 #000; }
        .coins { color: #ffcc00; font-size: 24px; text-shadow: 2px 2px 0 #000; }

        .menu-title {
            font-size: 4rem;
            color: #fff;
            text-shadow: 0px 6px 0px #003399, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 2px 2px 0px #000;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
            transform: skew(-5deg);
        }

        .character-select-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 90%;
            max-width: 800px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            border: 3px solid #4d94ff;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .char-card {
            min-width: 100px;
            height: 130px;
            background: #2a2a2a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #111;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0px #111;
        }

        .char-card.selected {
            border-color: #66ff33;
            background: #f0f0f0;
            transform: scale(1.1) translateY(-10px);
            box-shadow: 0 10px 0px #339900, 0 15px 20px rgba(0,0,0,0.5);
        }

        .char-card:active { transform: translateY(2px); box-shadow: 0 4px 0px #111; }

        .char-icon { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #000; margin-bottom: 8px; }
        .char-name { font-size: 16px; color: #fff; text-shadow: 1px 1px 0 #000; }
        .char-card.selected .char-name { color: #000; text-shadow: none; }

        .btn-play {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 200px;
            height: 75px;
            background: linear-gradient(180deg, #ffeb3b 0%, #ff9800 100%);
            border: 4px solid #fff;
            border-radius: 15px;
            font-size: 2.5rem;
            font-family: 'Lilita One', cursive;
            color: #fff;
            text-shadow: 3px 3px 0px #cc5200;
            box-shadow: 0 8px 0px #cc5200, 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-play:active { transform: translateY(8px); box-shadow: 0 0px 0px #cc5200; }

        /* --- OYUN İÇİ ARAYÜZ VE KONTROLLER --- */
        #game-ui {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #000; border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #controls-info {
            position: absolute; top: 10px; right: 10px;
            color: white; background: rgba(0, 0, 0, 0.5);
            padding: 8px 12px; border-radius: 8px;
            font-size: 12px; font-family: sans-serif; pointer-events: none;
        }

        /* YENİ SANAL JOYSTICK (Sol Alt) */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 140px;
            height: 140px;
            background: rgba(0, 0, 0, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(2px);
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ffffff, #cccccc);
            border: 3px solid #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        /* GÖRÜNÜR BUTONLAR (Sağ Alt - Yerleri Değişti) */
        .touch-btn {
            position: absolute;
            border: 4px solid #000;
            border-radius: 50%;
            pointer-events: auto;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: normal; font-size: 22px; text-shadow: 2px 2px 0px #000;
            box-shadow: 0 6px 0px #000, 0 10px 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .touch-btn:active { box-shadow: 0 2px 0px #000; }

        /* Zıplama Butonu (Şimdi en altta ve daha büyük) */
        #btn-jump-mobile {
            bottom: 40px;
            right: 40px;
            width: 90px; height: 90px;
            background: linear-gradient(180deg, #66ccff 0%, #0066cc 100%);
        }

        /* Ateş Etme Butonu (Şimdi Zıplamanın üstünde ve kırmızı) */
        #btn-shoot-mobile {
            bottom: 150px;
            right: 60px;
            width: 75px; height: 75px; font-size: 18px;
            background: linear-gradient(180deg, #ff6666 0%, #cc0000 100%);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-overlay">
        <div class="top-bar">
            <div class="profile-name">Savaşçı123</div>
            <div class="coins">🪙 1500</div>
        </div>
        <div class="menu-title">ELEMENT<br>SAVAŞLARI</div>
        
        <div class="character-select-container" id="char-container"></div>

        <button class="btn-play" onclick="startGame()">OYNA</button>
    </div>

    <div id="game-ui">
        <div class="crosshair"></div>
        <div id="controls-info">PC: WASD Yürü | Fare Bak | E Ateş | Space Zıpla</div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div class="touch-btn" id="btn-shoot-mobile" style="transform: translateY(0);">ATEŞ</div>
        <div class="touch-btn" id="btn-jump-mobile" style="transform: translateY(0);">ZIPLA</div>
    </div>

    <script>
        // --- KARAKTER VE ELEMENT LİSTESİ ---
        const CHARACTERS = [
            { name: "Ateş", color: 0xff3300, icon: "#ff3300" },
            { name: "Su", color: 0x0099ff, icon: "#0099ff" },
            { name: "Hava", color: 0x99ffff, icon: "#99ffff" },
            { name: "Toprak", color: 0x8b5a2b, icon: "#8b5a2b" },
            { name: "Şimşek", color: 0xffff00, icon: "#ffff00" },
            { name: "Buz", color: 0x00ffff, icon: "#00ffff" },
            { name: "Gölge", color: 0x4b0082, icon: "#4b0082" },
            { name: "Işık", color: 0xfff8dc, icon: "#fff8dc" },
            { name: "Doğa", color: 0x228b22, icon: "#228b22" },
            { name: "Lav", color: 0xff4500, icon: "#ff4500" }
        ];

        let selectedChar = CHARACTERS[0];

        // Menüyü Oluştur
        const charContainer = document.getElementById('char-container');
        CHARACTERS.forEach((char, index) => {
            const card = document.createElement('div');
            card.className = `char-card ${index === 0 ? 'selected' : ''}`;
            card.onclick = () => {
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedChar = char;
            };

            const icon = document.createElement('div');
            icon.className = 'char-icon';
            icon.style.background = char.icon;

            const name = document.createElement('div');
            name.className = 'char-name';
            name.innerText = char.name;

            card.appendChild(icon);
            card.appendChild(name);
            charContainer.appendChild(card);
        });

        // --- 3D SAHNE VE FİZİK DEĞİŞKENLERİ ---
        let scene, camera, renderer;
        let keys = { w: false, a: false, s: false, d: false };
        let projectiles = [];
        let isRightMouseDown = false, isLooking = false;
        let previousMousePosition = { x: 0, y: 0 };
        let yaw = 0, pitch = 0;

        let playerVelocityY = 0;
        let isGrounded = true;
        const gravity = -0.018;
        const jumpStrength = 0.45;
        const playerHeight = 3;

        // Joystick Değişkenleri
        let joyX = 0, joyY = 0; // -1 ile 1 arası değerler

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x5a9bd4); // Gerçekçi gökyüzü mavisi
            scene.fog = new THREE.FogExp2(0x5a9bd4, 0.003); // Gerçekçi derinlik hissi

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 0);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding; // Daha iyi renk ve yansıma hesaplaması
            document.body.appendChild(renderer.domElement);

            window.addEventListener('contextmenu', e => e.preventDefault());

            // Gelişmiş Gerçekçi Işıklandırma
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xfffaee, 1.2);
            sunLight.position.set(150, 200, 100);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 600;
            const d = 250;
            sunLight.shadow.camera.left = -d;
            sunLight.shadow.camera.right = d;
            sunLight.shadow.camera.top = d;
            sunLight.shadow.camera.bottom = -d;
            sunLight.shadow.bias = -0.0005; // Gölge hatalarını önler
            scene.add(sunLight);

            createDetailedCity();
        }

        // --- DETAYLI VE GERÇEKÇİ ŞEHİR ---
        function createDetailedCity() {
            // Gerçekçi Asfalt Zemin
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const roadMat = new THREE.MeshStandardMaterial({ color: 0x0f0f0f, roughness: 0.8 });
            for(let i = -300; i <= 300; i += 60) {
                const roadV = new THREE.Mesh(new THREE.PlaneGeometry(16, 800), roadMat);
                roadV.rotation.x = -Math.PI / 2; roadV.position.set(i, 0.05, 0); roadV.receiveShadow = true; scene.add(roadV);

                const roadH = new THREE.Mesh(new THREE.PlaneGeometry(800, 16), roadMat);
                roadH.rotation.x = -Math.PI / 2; roadH.position.set(0, 0.05, i); roadH.receiveShadow = true; scene.add(roadH);
            }

            // Gerçekçi Bina Materyalleri (Hafif yansımalı beton ve cam)
            const buildingMats = [
                new THREE.MeshStandardMaterial({ color: 0x8e9eab, roughness: 0.7, metalness: 0.2 }), // Açık gri
                new THREE.MeshStandardMaterial({ color: 0x4b5320, roughness: 0.8, metalness: 0.1 }), // Zeytin
                new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.6, metalness: 0.3 }), // Koyu lacivert
                new THREE.MeshStandardMaterial({ color: 0x7f8c8d, roughness: 0.7, metalness: 0.2 })  // Askeri gri
            ];
            const windowMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, roughness: 0.1, metalness: 0.8, emissive: 0x333300 });
            const propMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5, roughness: 0.5 });
            const foliageMat = new THREE.MeshStandardMaterial({ color: 0x1e5631, roughness: 0.9 });
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4c2e05, roughness: 1.0 });

            for (let x = -280; x <= 280; x += 60) {
                for (let z = -280; z <= 280; z += 60) {
                    if (Math.abs(x) < 30 && Math.abs(z) < 30) continue;

                    const h = 25 + Math.random() * 60;
                    const w = 18 + Math.random() * 10;
                    const d = 18 + Math.random() * 10;

                    const bMat = buildingMats[Math.floor(Math.random() * buildingMats.length)];
                    const building = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bMat);
                    building.position.set(x, h / 2, z);
                    building.castShadow = true; building.receiveShadow = true;
                    scene.add(building);

                    const ac = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), propMat);
                    ac.position.set(x + 2, h + 1.25, z + 2);
                    ac.castShadow = true; scene.add(ac);

                    for (let yWin = 6; yWin < h - 6; yWin += 6) {
                        const win = new THREE.Mesh(new THREE.PlaneGeometry(2, 2.5), windowMat);
                        win.position.set(x, yWin, z + d / 2 + 0.05);
                        scene.add(win);
                    }
                }
            }

            for (let i = -280; i <= 280; i += 30) {
                if (i % 60 === 0) continue;
                // Lamba
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 8), propMat);
                pole.position.set(i, 4, -10); pole.castShadow = true;
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                bulb.position.set(i, 8, -9.5);
                // Işık Kaynağı
                const pointLight = new THREE.PointLight(0xffffee, 0.5, 20);
                pointLight.position.set(i, 8, -9.5);
                scene.add(pole, bulb, pointLight);

                // Ağaç
                if (Math.random() > 0.5) {
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 4), trunkMat);
                    trunk.position.set(i, 2, 10); trunk.castShadow = true;
                    const foliage = new THREE.Mesh(new THREE.DodecahedronGeometry(3.5), foliageMat);
                    foliage.position.set(i, 5.5, 10); foliage.castShadow = true;
                    scene.add(trunk, foliage);
                }
            }
        }

        // --- KONTROLLER (Sanal Joystick & Bakış & Butonlar) ---
        function jump() {
            if (isGrounded) {
                playerVelocityY = jumpStrength;
                isGrounded = false;
                
                // Buton animasyonu için
                const btn = document.getElementById('btn-jump-mobile');
                btn.style.transform = 'translateY(5px)';
                setTimeout(() => btn.style.transform = 'translateY(0)', 100);
            }
        }

        function setupControls() {
            // PC Klavye
            window.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = true; if (key === 's') keys.s = true;
                if (key === 'a') keys.a = true; if (key === 'd') keys.d = true;
                if (key === 'e') shootElement();
                if (e.code === 'Space') jump();
            });
            window.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w') keys.w = false; if (key === 's') keys.s = false;
                if (key === 'a') keys.a = false; if (key === 'd') keys.d = false;
            });

            // PC Fare Bakış
            window.addEventListener('mousedown', (e) => {
                if (e.button === 2) { isRightMouseDown = true; previousMousePosition = { x: e.clientX, y: e.clientY }; }
            });
            window.addEventListener('mouseup', (e) => { if (e.button === 2) isRightMouseDown = false; });
            window.addEventListener('mousemove', (e) => {
                if (!isRightMouseDown) return;
                const deltaX = e.clientX - previousMousePosition.x; const deltaY = e.clientY - previousMousePosition.y;
                yaw -= deltaX * 0.003; pitch -= deltaY * 0.003;
                pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
                camera.rotation.y = yaw; camera.rotation.x = pitch;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            // --- MOBİL SANAL JOYSTICK (Sürükleme) ---
            const joyZone = document.getElementById('joystick-zone');
            const joyKnob = document.getElementById('joystick-knob');
            let joyActive = false;
            let joyCenter = { x: 0, y: 0 };
            const maxJoyRadius = 50;

            function handleJoyStart(e) {
                e.preventDefault();
                joyActive = true;
                const rect = joyZone.getBoundingClientRect();
                joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                updateJoystick(e.touches ? e.touches[0] : e);
            }

            function handleJoyMove(e) {
                if (!joyActive) return;
                e.preventDefault();
                updateJoystick(e.touches ? e.touches[0] : e);
            }

            function handleJoyEnd(e) {
                e.preventDefault();
                joyActive = false;
                joyKnob.style.transform = `translate(-50%, -50%)`;
                joyX = 0; joyY = 0;
            }

            function updateJoystick(input) {
                let dx = input.clientX - joyCenter.x;
                let dy = input.clientY - joyCenter.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance > maxJoyRadius) {
                    dx = (dx / distance) * maxJoyRadius;
                    dy = (dy / distance) * maxJoyRadius;
                }
                
                joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                
                // -1 ile 1 arasına normalize et (Oyun motoru için)
                joyX = dx / maxJoyRadius;
                joyY = dy / maxJoyRadius;
            }

            joyZone.addEventListener('touchstart', handleJoyStart);
            joyZone.addEventListener('touchmove', handleJoyMove);
            joyZone.addEventListener('touchend', handleJoyEnd);
            joyZone.addEventListener('mousedown', handleJoyStart);
            window.addEventListener('mousemove', handleJoyMove); // window to catch drags outside
            window.addEventListener('mouseup', handleJoyEnd);

            // --- MOBİL AKSİYON BUTONLARI ---
            const shootBtn = document.getElementById('btn-shoot-mobile');
            shootBtn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); shootElement(); 
                shootBtn.style.transform = 'translateY(5px)';
                setTimeout(() => shootBtn.style.transform = 'translateY(0)', 100);
            });
            shootBtn.addEventListener('mousedown', (e) => { shootElement(); });

            const jumpBtn = document.getElementById('btn-jump-mobile');
            jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
            jumpBtn.addEventListener('mousedown', (e) => { jump(); });

            // --- MOBİL KAMERA DÖNDÜRME (Ekranın sağ yarısına dokunarak sürükleme) ---
            let touchStartX = 0, touchStartY = 0;
            let activeLookTouchId = null;

            window.addEventListener('touchstart', (e) => {
                // UI tuşlarına basılıyorsa kamerayı çevirme
                if (e.target.closest('.touch-btn') || e.target.closest('#joystick-zone')) return;
                
                for(let i=0; i<e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.clientX > window.innerWidth / 2) {
                        isLooking = true;
                        activeLookTouchId = touch.identifier;
                        touchStartX = touch.clientX;
                        touchStartY = touch.clientY;
                    }
                }
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (!isLooking) return;
                for(let i=0; i<e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === activeLookTouchId) {
                        const deltaX = touch.clientX - touchStartX;
                        const deltaY = touch.clientY - touchStartY;
                        yaw -= deltaX * 0.005; pitch -= deltaY * 0.005;
                        pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
                        camera.rotation.y = yaw; camera.rotation.x = pitch;
                        touchStartX = touch.clientX; touchStartY = touch.clientY;
                    }
                }
            }, { passive: false });

            window.addEventListener('touchend', (e) => {
                for(let i=0; i<e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === activeLookTouchId) {
                        isLooking = false;
                        activeLookTouchId = null;
                    }
                }
            });
        }

        // --- ATEŞ ETME EFEKTİ ---
        function shootElement() {
            const projGeo = new THREE.SphereGeometry(1.2, 32, 32);
            const projMat = new THREE.MeshStandardMaterial({ 
                color: selectedChar.color, 
                emissive: selectedChar.color, 
                emissiveIntensity: 0.8,
                roughness: 0.2, metalness: 0.8
            });
            const proj = new THREE.Mesh(projGeo, projMat);

            const light = new THREE.PointLight(selectedChar.color, 3, 20);
            proj.add(light);

            proj.position.copy(camera.position);

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            proj.userData = { velocity: dir.multiplyScalar(3.0) }; // Mermiyi hızlandırdık

            scene.add(proj);
            projectiles.push(proj);
        }

        // --- OYUN BAŞLAT ---
        function startGame() {
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            initScene();
            setupControls();
            animate();
        }

        // --- OYUN DÖNGÜSÜ (Fizik ve Hareket) ---
        function animate() {
            requestAnimationFrame(animate);

            // Hareket Hesaplama (Joystick ve Klavye Birleşimi)
            let moveX = joyX;
            let moveZ = joyY; // Joystick'te Y ekseni ileri/geri demektir

            if (keys.w) moveZ = -1;
            if (keys.s) moveZ = 1;
            if (keys.a) moveX = -1;
            if (keys.d) moveX = 1;

            const moveVector = new THREE.Vector2(moveX, moveZ);
            if (moveVector.length() > 1) moveVector.normalize(); // Çapraz gitmeyi dengele

            const moveSpeed = 0.45;
            
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0; forward.normalize();

            const side = new THREE.Vector3();
            side.crossVectors(camera.up, forward).negate();

            // Yürüme Fiziği
            if (moveVector.length() > 0.05) {
                camera.position.addScaledVector(forward, -moveVector.y * moveSpeed);
                camera.position.addScaledVector(side, moveVector.x * moveSpeed);
            }

            // Zıplama / Yerçekimi Fiziği
            camera.position.y += playerVelocityY;
            playerVelocityY += gravity;

            if (camera.position.y <= playerHeight) {
                camera.position.y = playerHeight;
                playerVelocityY = 0;
                isGrounded = true;
            }

            // Mermi / Büyü Fiziği
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.position.add(p.userData.velocity);

                if (p.position.distanceTo(camera.position) > 300) {
                    scene.remove(p);
                    projectiles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
